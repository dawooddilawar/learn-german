version: '3'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: german-b1-vocab
    restart: unless-stopped
    environment:
      - VIRTUAL_HOST=learngerman.dawooddilawar.com
      - LETSENCRYPT_HOST=learngerman.dawooddilawar.com
      - LETSENCRYPT_EMAIL=dawood@dawooddilawar.com
    volumes:
      # Persist SQLite database
      - ./data/db.sqlite:/app/data/db.sqlite
      # Mount .env file for API key
      - ./.env:/app/.env:ro
    networks:
      - proxy-network
    expose:
      - "3000"

networks:
  proxy-network:
    external: true 
